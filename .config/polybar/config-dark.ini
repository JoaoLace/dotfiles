[colors]
background = #0a0b0c
background-alt = #161616
primary = #ffffff
disabled = #666666
coccupied = #aaaaaa
acolor = #ffffff
curgent = #ff0000

[bar/main]
bottom = false
monitor = HDMI-A-0
width = 100%
height = 28
padding-left = 0
padding-right = 3
background = ${colors.background}
foreground = ${colors.primary}

font-0 = "Hack Nerd Font:size=11"

line-size = 2
label-active-background = ${colors.background-alt}

modules-center = datetime
modules-left = workspaces xwindow
modules-right = separador pulseaudio separator memory separator cpu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3
override-redirect = false

[module/workspaces]
type = internal/i3
enable-click = true
enable-scroll = true
format-padding = 1.5
format = <label-state>
format-background = ${colors.background}   

label-focused = %name%
label-focused-padding = 1.5
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-underline-size = 2

label-unfocused = %name%
label-unfocused-padding = 1.5
label-unfocused-foreground = ${colors.primary}

label-visible = %name%
label-visible-padding = 1.5
label-visible-foreground = ${colors.primary}

label-urgent = %name%
label-urgent-padding = 1
label-urgent-foreground = ${colors.curgent}

[module/datetime]
type = internal/date
interval = 1.0
date = "%d/%m"
time = "%H:%M"
label = "%date% - %time%"

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
format-volume-prefix = "VOL:"
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${colors.disabled}
format-padding = 2

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM:"
format-prefix-foreground = ${colors.primary}
label = %used:MiB% / %total:MiB%
format-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU:"
label = %percentage:2%%
format-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
format-padding = 1

[module/separator]
type = custom/text
content = " | "
content-foreground = ${colors.primary}
content-padding = 1
