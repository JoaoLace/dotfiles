[colors]
background = #000000ff
background-alt = #161616
primary = #ffffff
disabled = #666666
coccupied = #aaaaaa
acolor = #ffffff
curgent = #ff0000

[bar/main]
bottom = false
monitor = HDMI-A-0
width = 100%
height = 28
padding-left = 0
padding-right = 3
background = ${colors.background}
foreground = ${colors.primary}

font-0 = "Hack Nerd Font:size=11"

line-size = 2
label-active-background = ${colors.background-alt}

modules-center = datetime
modules-left = workspaces xwindow
modules-right = separador pulseaudio separator memory separator cpu  


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3
override-redirect = false

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Workspaces
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/workspaces]
type = internal/i3
enable-click = true
enable-scroll = true
format-padding = 1.5
format = <label-state>
format-background = #000000

label-focused = %name%
label-focused-padding = 1.5
;label-focused-foreground = #ffffffff
label-focused-underline = #ffffff
label-focused-underline-size = 2

label-unfocused = %name%
label-unfocused-padding = 1.5
;label-unfocused-foreground = #ffffff

label-visible = %name%
label-visible-padding = 1.5
;label-visible-foreground = #ffffff

label-urgent = %name%
label-urgent-padding = 1
;label-urgent-foreground = #ffffff

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Date / Time
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/datetime]
type = internal/date
interval = 1.0
date = "%d/%m"
time = "%H:%M"
label = "%date% - %time%"

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Pulseaudio / Volume
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
format-volume-prefix = "VOL:"
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${colors.disabled}
format-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Memory
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM:"
format-prefix-foreground = ${colors.primary}
label = %used:MiB% / %total:MiB%
format-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CPU
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU:"
label = %percentage:2%%
format-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Window title
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
format-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Separator
;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/separator]
type = custom/text
content = " | "
content-foreground = ${colors.primary}
content-padding = 1
